services:
  - type: web
    name: study-planner-website
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: study_planner
