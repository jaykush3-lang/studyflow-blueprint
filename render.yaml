services:
  - type: web
    name: study-planner-website
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString

databases:
  - name: study-planner-db
